<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Throughput: The Inference Grid</title>
  <style>
    html, body { margin: 0; height: 100%; background: #060a12; color: #7fd4ff; font-family: 'Cascadia Code', 'Consolas', monospace; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    h1 { font-weight: 400; letter-spacing: 0.35em; text-transform: uppercase; font-size: 1.1rem; color: #4ea8de; }
    .pulse { width: 480px; max-width: 80vw; height: 2px; background: #0d1b2a; position: relative; overflow: hidden; border-radius: 2px; }
    .pulse::after { content: ""; position: absolute; top: 0; left: -20%; width: 20%; height: 100%;
      background: linear-gradient(90deg, transparent, #58e1c1, transparent); animation: flow 1.6s linear infinite; }
    @keyframes flow { to { left: 120%; } }
    p { color: #33506b; font-size: 0.8rem; letter-spacing: 0.15em; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Throughput</h1>
    <div class="pulse"></div>
    <p>THE INFERENCE GRID &mdash; PROVISIONING&hellip;</p>
  </div>
</body>
</html>
